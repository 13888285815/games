name: Deploy to Vercel and GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          npm ci
        fi
    
    - name: Build site
      run: |
        # 创建必要的目录结构
        mkdir -p public/assets public/games public/scripts public/styles
        
        # 检查文件是否存在并复制
        if [ ! -f public/index.html ]; then
          echo "Warning: index.html not found"
        fi
        
        # 生成站点地图
        echo "Generating sitemap..."
        cat > public/sitemap.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          <url>
            <loc>https://13888285815.github.io/games/</loc>
            <lastmod>2026-03-27</lastmod>
            <changefreq>daily</changefreq>
            <priority>1.0</priority>
          </url>
          <url>
            <loc>https://13888285815.github.io/games/test-compatibility.html</loc>
            <lastmod>2026-03-27</lastmod>
            <changefreq>monthly</changefreq>
            <priority>0.8</priority>
          </url>
          <url>
            <loc>https://13888285815.github.io/games/games/snake.html</loc>
            <lastmod>2026-03-27</lastmod>
            <changefreq>monthly</changefreq>
            <priority>0.7</priority>
          </url>
          <url>
            <loc>https://13888285815.github.io/games/games/tetris.html</loc>
            <lastmod>2026-03-27</lastmod>
            <changefreq>monthly</changefreq>
            <priority>0.7</priority>
          </url>
          <url>
            <loc>https://13888285815.github.io/games/games/memory-match.html</loc>
            <lastmod>2026-03-27</lastmod>
            <changefreq>monthly</changefreq>
            <priority>0.7</priority>
          </url>
        </urlset>
        EOF
        
        # 生成robots.txt
        echo "Generating robots.txt..."
        cat > public/robots.txt << 'EOF'
        User-agent: *
        Allow: /
        
        Sitemap: https://13888285815.github.io/games/sitemap.xml
        
        User-agent: Googlebot
        Allow: /
        
        User-agent: Bingbot
        Allow: /
        
        User-agent: Slurp
        Allow: /
        
        User-agent: DuckDuckBot
        Allow: /
        
        User-agent: Baiduspider
        Allow: /
        
        User-agent: YandexBot
        Allow: /
        EOF
        
        # 压缩CSS和JS文件
        if command -v uglifyjs &> /dev/null; then
          echo "Minifying JavaScript files..."
          for js in public/scripts/*.js; do
            if [ -f "$js" ]; then
              uglifyjs "$js" -o "$js.min" -c -m
              mv "$js.min" "$js"
            fi
          done
        fi
        
        if command -v cleancss &> /dev/null; then
          echo "Minifying CSS files..."
          for css in public/styles/*.css; do
            if [ -f "$css" ]; then
              cleancss -o "$css.min" "$css"
              mv "$css.min" "$css"
            fi
          done
        fi
        
        echo "Build completed!"
    
    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public
    
    - name: Setup Vercel CLI
      run: |
        if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
          npm install --global vercel@latest
        else
          echo "Vercel secrets not configured, skipping Vercel deployment"
        fi
    
    - name: Deploy to Vercel
      if: ${{ secrets.VERCEL_TOKEN && secrets.VERCEL_ORG_ID && secrets.VERCEL_PROJECT_ID }}
      run: |
        export VERCEL_ORG_ID=${{ secrets.VERCEL_ORG_ID }}
        export VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID }}
        vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
    
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public

  test:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run compatibility tests
      run: |
        echo "Running basic compatibility tests..."
        # 检查基本文件是否存在
        REQUIRED_FILES=(
          "public/index.html"
          "public/styles/style.css"
          "public/scripts/main.js"
          "public/manifest.json"
          "public/service-worker.js"
        )
        
        for file in "${REQUIRED_FILES[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file exists"
          else
            echo "✗ $file missing"
            exit 1
          fi
        done
        
        # 检查HTML有效性
        if command -v tidy &> /dev/null; then
          echo "Checking HTML validity..."
          tidy -q -errors public/index.html 2>&1 || true
        fi
        
        echo "All tests passed!"
    
    - name: Lighthouse audit
      uses: treosh/lighthouse-ci-action@v11
      with:
        configPath: './.github/workflows/lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-deploy, test]
    if: always()
    
    steps:
    - name: Deployment status
      run: |
        if [ "${{ needs.build-and-deploy.result }}" == "success" ] && [ "${{ needs.test.result }}" == "success" ]; then
          echo "✅ Deployment successful!"
          echo "GitHub Pages: https://13888285815.github.io/games/"
          echo "Vercel: https://4399-game-world.vercel.app/"
        else
          echo "❌ Deployment failed or tests failed"
          echo "Build status: ${{ needs.build-and-deploy.result }}"
          echo "Test status: ${{ needs.test.result }}"
        fi